<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 160" width="920" height="160">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Inter:wght@700&amp;family=Playfair+Display:ital,wght@1,700&amp;display=swap');
    </style>
    <radialGradient id="hero-glow" cx="50%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#10b981" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#050505" stop-opacity="0"/>
    </radialGradient>
    <filter id="text-glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="8" result="blur"/>
      <feColorMatrix in="blur" type="matrix" values="0 0 0 0 0.204  0 0 0 0 0.827  0 0 0 0 0.6  0 0 0 0.35 0" result="glow"/>
      <feMerge>
        <feMergeNode in="glow"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <rect width="920" height="160" rx="12" fill="#050505"/>
  <rect width="920" height="160" rx="12" fill="url(#hero-glow)"/>
  <text filter="url(#text-glow)" x="20" y="108" font-family="'Inter', sans-serif" font-weight="700" font-size="80" letter-spacing="-2" fill="#ffffff">Canberra AI <tspan dx="8" font-family="'Playfair Display', serif" font-style="italic" fill="#34d399">Agency</tspan></text>
</svg>